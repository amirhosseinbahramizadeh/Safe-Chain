name: Security

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit || true
      - name: Run cargo-audit
        run: cargo audit || true
